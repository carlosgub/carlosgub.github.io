<!doctype html>

  <head>
    <meta charset="utf-8">
    <title>Typist</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/scss/main.css" type="text/css" charset="utf-8">
  </head>
  <body>
  	<style type="text/css">
  		.containerBox {
		    position: relative;
		    display: inline-block;
		}
		.text-box {
		    position: absolute;    
		    display: block
		    height: 100%;
		    text-align: center;    
		    width: 100%;
		}
		.text-box:before {
		   content: '';
		   display: inline-block;
		   height: 100%;
		   vertical-align: middle;
		}
		.typistText {
			font-family: 'Roboto';
			font-size: 25px;
		   display: block;
		   color: #000;   
		}
		.foto{
		  display: block;
    margin:auto;
		  width: 10%;
		  height: auto;
		}
		.imgWallpaper {
		  display: block;
		  width: 100%;
		  height: auto;
		}
		body {
		    font-family: 'Open Sans',sans-serif;
		    font-size: 14px;
		    font-weight: 400;
		    line-height: 1.5;
		    overflow-x: hidden;
		    -webkit-font-smoothing: antialiased;
		    -moz-font-smoothing: antialiased;
		    text-rendering: optimizeLegibility;
		}
  	</style>
    <!--[if lt IE 10]>
      <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="http://browsehappy.com/">upgrade your browser</a> to improve your experience.</p>
    <![endif]-->
    <div class="container-fluid">
    	<div class="row">
    		<div class="col-sm-12 containerBox">
    			<div class="text-box">
	    			<h5 class="typistText">Hola, me llamo</p>
	    			<h1 class="typistText">Carlos Ugaz</p>
	    			<p class="typist typistText"></p>
    			</div>
    			<img class="imgWallpaper" src="/img/wallpaper.png" class="img-responsive">
    		</div>
    	</div>
	    
    </div>
    <script src="/node_modules/jquery/dist/jquery.min.js"></script>	
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.11.0/umd/popper.min.js" integrity="sha384-b/U6ypiBEHpOf/4+1nzFpr53nxSS+GLCkfwBdFNTxtclqqenISfwAzpKaMNFNmj4" crossorigin="anonymous"></script>
	<script src="/node_modules/bootstrap/dist/js/bootstrap.min.js" ></script>
	<script src="/node_modules/jquery.typist/src/jquery.typist.js"></script>
	<script type="text/javascript">
		jQuery(function($) {
			$('.typist').typist({
				speed: 12,
				text: 'y soy Desarrollador Android!'
			})
			.typistPause(2000) // 2 sec
			.typistRemove(22)
			.typistAdd('Full Stack!')
			.typistStop();
		});
	</script>
  </body>
</html>
